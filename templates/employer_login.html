<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Login — ResumeAI</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root { --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: rgba(18,18,26,0.85); --accent: #6366f1; --accent-hover: #4f46e5; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-color: rgba(255,255,255,0.08); --success: #10b981; --danger: #ef4444; }
        body { background: var(--bg-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; position: relative; }
        .hero-bg { position: fixed; inset: 0; z-index: -1; }
        .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
        .hero-orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -100px; animation: drift 25s infinite alternate; }
        .hero-orb-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -200px; right: -100px; animation: drift 22s infinite alternate-reverse; }
        .hero-orb-3 { width: 400px; height: 400px; background: #ec4899; top: 50%; left: 60%; animation: drift 28s infinite alternate; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }
        .card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 20px; padding: 40px; width: 100%; max-width: 440px; position: relative; }
        .card-header { text-align: center; margin-bottom: 28px; }
        .logo-text { font-size: 28px; font-weight: 800; }
        .logo-accent { color: var(--accent); }
        .card-header p { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }
        .toggle-bar { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
        .toggle-bar button { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; }
        .toggle-bar button.active { background: var(--accent); color: white; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 14px; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--accent); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { background: var(--accent-hover); }
        .status-text { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
        .status-text.show { display: block; }
        .status-text.error { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .status-text.success { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .divider { text-align: center; margin: 16px 0; color: var(--text-secondary); font-size: 12px; }
        .back-link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-secondary); text-decoration: none; }
        .back-link:hover { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="hero-bg">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-orb hero-orb-3"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="logo-text">Resume<span class="logo-accent">AI</span></div>
            <p>Employer Portal — Post jobs and track applicants</p>
        </div>

        <div class="toggle-bar">
            <button id="tab-login-btn" class="active" onclick="showPanel('login')">Sign In</button>
            <button id="tab-register-btn" onclick="showPanel('register')">Register</button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="form-panel active" id="panel-login">
            <div class="input-group">
                <label>Company Email</label>
                <input type="email" id="email-input" placeholder="hr@yourcompany.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password-input" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="employerLogin()">
                Sign In as Employer
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </div>

        <!-- REGISTER PANEL -->
        <div class="form-panel" id="panel-register">
            <div class="input-group">
                <label>Company Name *</label>
                <input type="text" id="company-name" placeholder="Acme Corporation">
            </div>
            <div class="input-group">
                <label>Your Name *</label>
                <input type="text" id="contact-name" placeholder="Jane Smith">
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Email *</label>
                    <input type="email" id="reg-email" placeholder="jane@company.com">
                </div>
                <div class="input-group">
                    <label>Industry</label>
                    <input type="text" id="industry" placeholder="Technology">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Password *</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters">
                </div>
                <div class="input-group">
                    <label>Company Size</label>
                    <input type="text" id="company-size" placeholder="e.g. 51-200">
                </div>
            </div>
            <button class="btn-primary" onclick="employerRegister()">
                Create Employer Account
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

        <div class="status-text" id="auth-status"></div>

        <div class="footer-link">
            Are you a candidate? <a href="/login">Sign in here</a>
        </div>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

<script>
function showPanel(name) {
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.toggle-bar button').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.getElementById('tab-' + name + '-btn').classList.add('active');
}

function showStatus(message, isError) {
    const el = document.getElementById('auth-status');
    el.textContent = message;
    el.className = 'status-text show ' + (isError ? 'error' : 'success');
}

async function employerLogin() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    if (!email || !password) { showStatus('Email and password are required.', true); return; }
    try {
        const res = await fetch('/auth/employer/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
            showStatus('Welcome back! Redirecting...', false);
            setTimeout(() => window.location.href = '/employer/dashboard', 800);
        } else {
            showStatus(data.error || 'Login failed.', true);
        }
    } catch (e) { showStatus('Network error. Please try again.', true); }
}

async function employerRegister() {
    const company_name = document.getElementById('company-name').value.trim();
    const name = document.getElementById('contact-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const industry = document.getElementById('industry').value.trim();
    const company_size = document.getElementById('company-size').value.trim();
    if (!company_name || !name || !email || !password) { showStatus('Company name, your name, email and password are required.', true); return; }
    try {
        const res = await fetch('/auth/employer/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ company_name, name, email, password, industry, company_size })
        });
        const data = await res.json();
        if (data.success) {
            showStatus('Account created! Redirecting...', false);
            setTimeout(() => window.location.href = '/employer/dashboard', 800);
        } else {
            showStatus(data.error || 'Registration failed.', true);
        }
    } catch (e) { showStatus('Network error. Please try again.', true); }
}
</script>
</body>
</html>
